spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/whosup
    username: whosup
    password: whosup
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET:dev-secret-key-that-is-at-least-256-bits-long-for-hs256}
  expiration: 86400000

server:
  port: 8080
