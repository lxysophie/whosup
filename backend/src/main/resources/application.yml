spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/whosup
    username: whosup
    password: whosup
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  seed-data: ${SEED_DATA:true}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-that-is-at-least-256-bits-long-for-hs256}
  expiration: 86400000

server:
  port: 8080
