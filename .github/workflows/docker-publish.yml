name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
  workflow_dispatch:

env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  build-backend:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          provenance: false
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}-${{ matrix.suffix }}

  merge-backend:
    needs: build-backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker manifest create ${{ env.BACKEND_IMAGE }}:latest \
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}-amd64 \
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}-arm64

          docker manifest create ${{ env.BACKEND_IMAGE }}:sha-${GITHUB_SHA::7} \
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}-amd64 \
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}-arm64

          docker manifest push ${{ env.BACKEND_IMAGE }}:latest
          docker manifest push ${{ env.BACKEND_IMAGE }}:sha-${GITHUB_SHA::7}

  build-frontend:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          provenance: false
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}-${{ matrix.suffix }}

  merge-frontend:
    needs: build-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker manifest create ${{ env.FRONTEND_IMAGE }}:latest \
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}-amd64 \
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}-arm64

          docker manifest create ${{ env.FRONTEND_IMAGE }}:sha-${GITHUB_SHA::7} \
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}-amd64 \
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}-arm64

          docker manifest push ${{ env.FRONTEND_IMAGE }}:latest
          docker manifest push ${{ env.FRONTEND_IMAGE }}:sha-${GITHUB_SHA::7}
