apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: whosup
type: Opaque
data:
  JWT_SECRET: azhzLWp3dC1zZWNyZXQta2V5LXRoYXQtaXMtYXQtbGVhc3QtMjU2LWJpdHMtbG9uZy1mb3ItaHMyNTY=
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: whosup
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/lxysophie/whosup/backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://db:5432/whosup
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
            - name: SEED_DATA
              value: "true"
          readinessProbe:
            httpGet:
              path: /api/activities?size=1
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/activities?size=1
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: whosup
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-restart
  namespace: whosup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-restart
  namespace: whosup
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["backend"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-restart
  namespace: whosup
subjects:
  - kind: ServiceAccount
    name: backend-restart
roleRef:
  kind: Role
  name: backend-restart
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backend-restart
  namespace: whosup
spec:
  schedule: "0 8 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: backend-restart
          containers:
            - name: kubectl
              image: bitnami/kubectl:latest
              command:
                - kubectl
                - rollout
                - restart
                - deployment/backend
                - -n
                - whosup
          restartPolicy: OnFailure
