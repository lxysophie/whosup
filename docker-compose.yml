services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: whosup
      POSTGRES_USER: whosup
      POSTGRES_PASSWORD: whosup
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whosup"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/whosup
      SPRING_DATASOURCE_USERNAME: whosup
      SPRING_DATASOURCE_PASSWORD: whosup
      JWT_SECRET: docker-dev-secret-key-that-is-at-least-256-bits-long
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
